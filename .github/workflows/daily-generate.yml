name: Daily Content Generation

on:
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨0点（北京时间8点）
  workflow_dispatch:      # 支持手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Content
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: node scripts/generate.mjs

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/posts.json public/images/
          git diff --staged --quiet || git commit -m "Auto-generate daily content $(date +\%Y-\%m-\%d)"
          git push

      - name: Deploy to Netlify
        run: |
          rm -rf .next out
          npx next build
          npx netlify deploy --prod --dir=out --no-build --site-id ${{ secrets.NETLIFY_SITE_ID }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
